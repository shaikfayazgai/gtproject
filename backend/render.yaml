# Render Blueprint — single all-in-one backend Web Service.
#
# Runs all 9 FastAPI microservices + the gateway in ONE container
# (Dockerfile.allinone -> run_all_in_one.py). Cheapest option: works on Render's
# Free instance. The gateway binds Render's $PORT; services run on loopback.
# DB stays on Neon (set DATABASE_URL below in the dashboard).
#
# Deploy:
#   Render -> New -> Blueprint -> pick this repo -> Apply -> fill the secrets.

services:
  - type: web
    name: gtproject-backend
    runtime: docker
    plan: free
    region: singapore
    rootDir: backend
    dockerfilePath: ./Dockerfile.allinone
    healthCheckPath: /healthz
    envVars:
      # Secrets — Render will prompt for these (sync:false).
      - key: DATABASE_URL
        sync: false
      - key: API_SECRET_KEY
        sync: false
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_APP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      # Non-secret defaults.
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SERVICE_START_STAGGER
        value: "3"
